<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>矩阵模逆计算器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 10px;
            font-size: 2rem;
        }

        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 0.95rem;
        }

        .input-section {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .input-group {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .input-group label {
            font-weight: 600;
            color: #444;
        }

        .input-group input {
            width: 80px;
            padding: 10px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 1rem;
            text-align: center;
            transition: border-color 0.3s;
        }

        .input-group input:focus {
            outline: none;
            border-color: #667eea;
        }

        .btn {
            padding: 12px 30px;
            font-size: 1rem;
            font-weight: 600;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: #f0f0f0;
            color: #333;
        }

        .btn-secondary:hover {
            background: #e0e0e0;
        }

        .matrix-container {
            display: flex;
            justify-content: center;
            gap: 60px;
            flex-wrap: wrap;
            margin: 30px 0;
        }

        .matrix-box {
            text-align: center;
        }

        .matrix-box h3 {
            color: #555;
            margin-bottom: 15px;
            font-size: 1.1rem;
        }

        .matrix {
            display: inline-grid;
            gap: 5px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 12px;
            border: 2px solid #e9ecef;
        }

        .matrix input {
            width: 60px;
            height: 45px;
            text-align: center;
            font-size: 1.1rem;
            border: 2px solid #ddd;
            border-radius: 6px;
            transition: border-color 0.3s;
        }

        .matrix input:focus {
            outline: none;
            border-color: #667eea;
        }

        .matrix .result-cell {
            width: 60px;
            height: 45px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
            font-weight: 600;
            color: #333;
            background: white;
            border-radius: 6px;
            border: 2px solid #667eea;
        }

        .result-info {
            background: #f0f7ff;
            border-radius: 12px;
            padding: 20px;
            margin: 20px 0;
            border-left: 4px solid #667eea;
        }

        .result-info h4 {
            color: #333;
            margin-bottom: 10px;
        }

        .result-info p {
            color: #555;
            margin: 5px 0;
        }

        .result-info .value {
            font-weight: 600;
            color: #667eea;
        }

        .error-box {
            background: #fff0f0;
            border-radius: 12px;
            padding: 20px;
            margin: 20px 0;
            border-left: 4px solid #e74c3c;
            color: #c0392b;
        }

        .hidden {
            display: none;
        }

        .buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 20px;
            flex-wrap: wrap;
        }

        .theory {
            margin-top: 40px;
            padding: 25px;
            background: #f8f9fa;
            border-radius: 12px;
            border: 1px solid #e9ecef;
        }

        .theory h3 {
            color: #333;
            margin-bottom: 15px;
            font-size: 1.2rem;
        }

        .theory ol {
            color: #555;
            padding-left: 20px;
            line-height: 1.8;
        }

        .theory code {
            background: #e9ecef;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 0.9rem;
        }

        @media (max-width: 600px) {
            .container {
                padding: 20px;
            }

            .matrix-container {
                gap: 30px;
            }

            .matrix input, .matrix .result-cell {
                width: 50px;
                height: 40px;
                font-size: 1rem;
            }

            h1 {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>矩阵模逆计算器</h1>
        <p class="subtitle">用于希尔密码等密码学场景的矩阵模逆运算</p>

        <div class="input-section">
            <div class="input-group">
                <label>矩阵大小 N:</label>
                <input type="number" id="matrixSize" value="3" min="1" max="10">
            </div>
            <div class="input-group">
                <label>模数 N:</label>
                <input type="number" id="modulus" value="26" min="2">
            </div>
            <button class="btn btn-secondary" onclick="generateMatrix()">生成矩阵</button>
        </div>

        <div class="matrix-container">
            <div class="matrix-box">
                <h3>输入矩阵</h3>
                <div class="matrix" id="inputMatrix"></div>
            </div>

            <div class="matrix-box" id="resultBox" class="hidden">
                <h3>模逆矩阵</h3>
                <div class="matrix" id="resultMatrix"></div>
            </div>
        </div>

        <div id="resultInfo" class="result-info hidden">
            <h4>计算结果</h4>
            <p>行列式的值: <span class="value" id="detValue"></span></p>
            <p>行列式的模逆: <span class="value" id="detInverse"></span></p>
        </div>

        <div id="errorBox" class="error-box hidden"></div>

        <div class="buttons">
            <button class="btn btn-primary" onclick="calculate()">计算模逆</button>
            <button class="btn btn-secondary" onclick="clearAll()">清空</button>
        </div>

        <div class="theory">
            <h3>计算原理</h3>
            <ol>
                <li>计算行列式的值 D，并判断 <code>gcd(D, N) = 1</code>，否则矩阵不可逆</li>
                <li>计算行列式值对 N 的模逆 <code>D_invert</code>，即满足 <code>D * D_invert ≡ 1 (mod N)</code></li>
                <li>计算每个位置的代数余子式 Aij，再乘以 D_invert 并模 N</li>
                <li>将得到的矩阵转置，即为模逆矩阵</li>
            </ol>
        </div>
    </div>

    <script>
        // 页面加载时初始化
        document.addEventListener('DOMContentLoaded', function() {
            generateMatrix();
        });

        function generateMatrix() {
            const size = parseInt(document.getElementById('matrixSize').value);
            if (size < 1 || size > 10) {
                alert('矩阵大小请在 1-10 之间');
                return;
            }

            const inputMatrix = document.getElementById('inputMatrix');
            inputMatrix.innerHTML = '';
            inputMatrix.style.gridTemplateColumns = `repeat(${size}, 1fr)`;

            for (let i = 0; i < size; i++) {
                for (let j = 0; j < size; j++) {
                    const input = document.createElement('input');
                    input.type = 'number';
                    input.id = `cell-${i}-${j}`;
                    input.value = '0';
                    inputMatrix.appendChild(input);
                }
            }

            // 清空结果
            document.getElementById('resultBox').classList.add('hidden');
            document.getElementById('resultInfo').classList.add('hidden');
            document.getElementById('errorBox').classList.add('hidden');
        }

        function getMatrixValues() {
            const size = parseInt(document.getElementById('matrixSize').value);
            const matrix = [];

            for (let i = 0; i < size; i++) {
                const row = [];
                for (let j = 0; j < size; j++) {
                    const value = parseInt(document.getElementById(`cell-${i}-${j}`).value) || 0;
                    row.push(value);
                }
                matrix.push(row);
            }

            return matrix;
        }

        function displayResult(matrix) {
            const size = matrix.length;
            const resultBox = document.getElementById('resultBox');
            const resultMatrix = document.getElementById('resultMatrix');

            resultMatrix.innerHTML = '';
            resultMatrix.style.gridTemplateColumns = `repeat(${size}, 1fr)`;

            for (let i = 0; i < size; i++) {
                for (let j = 0; j < size; j++) {
                    const cell = document.createElement('div');
                    cell.className = 'result-cell';
                    cell.textContent = matrix[i][j];
                    resultMatrix.appendChild(cell);
                }
            }

            resultBox.classList.remove('hidden');
        }

        async function calculate() {
            const matrix = getMatrixValues();
            const mod = parseInt(document.getElementById('modulus').value);

            document.getElementById('errorBox').classList.add('hidden');
            document.getElementById('resultInfo').classList.add('hidden');

            try {
                const response = await fetch('/calculate', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        matrix: matrix,
                        mod: mod
                    })
                });

                const data = await response.json();

                if (data.success) {
                    displayResult(data.result);
                    document.getElementById('detValue').textContent = data.determinant;
                    document.getElementById('detInverse').textContent = data.determinant_inverse;
                    document.getElementById('resultInfo').classList.remove('hidden');
                } else {
                    showError(data.error);
                }
            } catch (error) {
                showError('计算出错: ' + error.message);
            }
        }

        function showError(message) {
            const errorBox = document.getElementById('errorBox');
            errorBox.textContent = message;
            errorBox.classList.remove('hidden');
            document.getElementById('resultBox').classList.add('hidden');
            document.getElementById('resultInfo').classList.add('hidden');
        }

        function clearAll() {
            const size = parseInt(document.getElementById('matrixSize').value);
            for (let i = 0; i < size; i++) {
                for (let j = 0; j < size; j++) {
                    document.getElementById(`cell-${i}-${j}`).value = '0';
                }
            }
            document.getElementById('resultBox').classList.add('hidden');
            document.getElementById('resultInfo').classList.add('hidden');
            document.getElementById('errorBox').classList.add('hidden');
        }
    </script>
</body>
</html>
